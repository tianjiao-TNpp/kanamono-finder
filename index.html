<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>五金件さがし | 用途から金物を見つける</title>
<style>
  :root{
    --bg:#0f1419; --panel:#171f29; --panel2:#1e2935; --line:#2b3947;
    --txt:#e8edf2; --sub:#9fb0c0; --accent:#4ea1ff; --accent2:#ffb454;
    --chip:#22303d; --good:#46c98b; --shadow:0 4px 20px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:linear-gradient(180deg,#0c1116,#0f1419 40%);
    color:var(--txt);
    font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic UI","Meiryo",sans-serif;
    line-height:1.6; min-height:100vh;
  }
  .wrap{max-width:920px;margin:0 auto;padding:20px 16px 80px}
  header h1{font-size:1.5rem;margin:0 0 4px;letter-spacing:.02em}
  header p{margin:0;color:var(--sub);font-size:.9rem}
  .accent{color:var(--accent)}

  .modetabs{display:flex;gap:8px;margin:16px 0 8px}
  .modetab{flex:1;text-align:center;background:var(--panel);border:1px solid var(--line);
    color:var(--sub);border-radius:12px;padding:12px;cursor:pointer;font-size:1rem;font-weight:600}
  .modetab.active{background:var(--accent);border-color:var(--accent);color:#06121f}

  .lead{color:var(--sub);font-size:.92rem;margin:8px 2px 14px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
  .tile{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:16px 14px;cursor:pointer;transition:.15s;text-align:left}
  .tile:hover{border-color:var(--accent);transform:translateY(-2px)}
  .tile .ic{font-size:1.5rem;display:block;margin-bottom:6px}
  .tile .tl{font-weight:700;font-size:1rem}
  .tile .sb{color:var(--sub);font-size:.8rem;margin-top:3px}

  .crumb{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:6px 2px 14px;font-size:.9rem;color:var(--sub)}
  .crumb .path{color:var(--accent2);font-weight:600}
  .backbtn{background:var(--panel2);border:1px solid var(--line);color:var(--sub);
    border-radius:10px;padding:6px 14px;cursor:pointer;font-size:.88rem}
  .backbtn:hover{color:var(--txt)}
  .qtitle{font-size:1.2rem;font-weight:700;margin:6px 2px 8px}
  .qhint{color:var(--sub);font-size:.82rem;margin:0 2px 14px}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:14px 16px;cursor:pointer;transition:.15s;display:flex;justify-content:space-between;align-items:center;gap:10px}
  .opt:hover{border-color:var(--accent);background:var(--panel2)}
  .opt .ol{font-weight:600}
  .opt .od{color:var(--sub);font-size:.82rem;margin-top:2px}
  .opt .arrow{color:var(--accent);font-size:1.2rem}

  .searchrow{display:flex;gap:8px;margin-top:6px}
  input[type=text]{flex:1;background:var(--panel);border:1px solid var(--line);color:var(--txt);
    border-radius:12px;padding:14px 16px;font-size:1.05rem;outline:none}
  input[type=text]:focus{border-color:var(--accent)}
  button.clear{background:var(--panel2);border:1px solid var(--line);color:var(--sub);
    border-radius:12px;padding:0 16px;font-size:.95rem;cursor:pointer}
  button.clear:hover{color:var(--txt)}
  .filters{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .chip{background:var(--chip);border:1px solid var(--line);color:var(--sub);
    border-radius:999px;padding:6px 14px;font-size:.85rem;cursor:pointer;user-select:none;transition:.15s}
  .chip:hover{color:var(--txt)}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#06121f;font-weight:700}

  .meta{color:var(--sub);font-size:.85rem;margin:18px 2px 8px}

  /* cards */
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:14px;margin-bottom:12px;box-shadow:var(--shadow)}
  .cardrow{display:flex;gap:14px;align-items:flex-start}
  .illus{flex:0 0 78px;width:78px;height:78px;border-radius:10px;background:var(--panel2);
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--accent);overflow:hidden}
  .illus img{width:100%;height:100%;object-fit:cover}
  .ill{width:60px;height:60px}
  .ill *{fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .cbody{flex:1;min-width:0}
  .card h3{margin:0;font-size:1.15rem;display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
  .yomi{color:var(--sub);font-size:.78rem;font-weight:400}
  .catbadge{font-size:.7rem;padding:3px 9px;border-radius:6px;font-weight:700;white-space:nowrap}
  .cat-fas{background:#1d3a52;color:#7cc4ff}
  .cat-bld{background:#3a2d18;color:#ffc97a}
  .cat-pipe{background:#143a2f;color:#6fe0b0}
  .cat-gen{background:#33283f;color:#cfa6ff}
  .why{margin:8px 0 4px;background:rgba(255,180,84,.12);border-left:3px solid var(--accent2);
    border-radius:0 8px 8px 0;padding:7px 11px;color:#ffd9a0;font-size:.9rem}
  .desc{margin:7px 0 6px;color:#d4dde6;font-size:.93rem}
  .uses{margin:0 0 8px;color:var(--sub);font-size:.86rem}
  .uses b{color:var(--good);font-weight:600}
  table.spec{border-collapse:collapse;width:100%;font-size:.82rem;margin:2px 0 8px}
  table.spec th{text-align:left;color:var(--accent);font-weight:600;white-space:nowrap;
    padding:3px 10px 3px 0;vertical-align:top;width:1%}
  table.spec td{color:#cdd8e2;padding:3px 0;vertical-align:top}
  table.spec tr+tr th,table.spec tr+tr td{border-top:1px solid var(--line)}
  .tags{margin-top:6px;display:flex;flex-wrap:wrap;gap:6px}
  .tag{background:var(--panel2);border:1px solid var(--line);color:var(--sub);
    border-radius:6px;padding:2px 8px;font-size:.74rem}
  mark{background:rgba(255,180,84,.28);color:#ffd9a0;border-radius:3px;padding:0 2px}

  .examples{margin-top:12px;color:var(--sub);font-size:.82rem}
  .examples b{color:var(--txt);font-weight:600}
  .ex{display:inline-block;background:transparent;border:1px dashed var(--line);
    color:var(--accent);border-radius:8px;padding:3px 9px;margin:3px 4px 0 0;cursor:pointer;font-size:.82rem}
  .ex:hover{background:var(--panel)}
  .empty{text-align:center;color:var(--sub);padding:40px 10px}
  .hidden{display:none}
  footer{margin-top:30px;color:#56697a;font-size:.78rem;text-align:center}
  @media(max-width:520px){.illus{flex-basis:62px;width:62px;height:62px}.ill{width:46px;height:46px}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🔩 五金件さがし</h1>
    <p>部品の名前が分からなくてもOK。<span class="accent">「何をしたいか」</span>から金物を見つけます。</p>
  </header>

  <div class="modetabs">
    <div class="modetab active" data-mode="guide">🧭 用途から探す</div>
    <div class="modetab" data-mode="search">🔍 キーワード検索</div>
  </div>

  <!-- ========== 用途から探す ========== -->
  <section id="mode-guide">
    <div id="guideTop">
      <p class="lead">やりたいことを選んでください。（客先で「○○したいんだけど…」の○○）</p>
      <div class="grid" id="intentGrid"></div>
    </div>
    <div id="guideFlow" class="hidden">
      <div class="crumb">
        <button class="backbtn" id="backBtn">← 戻る</button>
        <button class="backbtn" id="topBtn">最初から</button>
        <span class="path" id="crumbPath"></span>
      </div>
      <div id="flowBody"></div>
    </div>
  </section>

  <!-- ========== キーワード検索 ========== -->
  <section id="mode-search" class="hidden">
    <div class="searchrow">
      <input type="text" id="q" placeholder="例：緩み止め／石膏ボード／ホース 締める" autocomplete="off">
      <button class="clear" id="clear">クリア</button>
    </div>
    <div class="filters" id="filters">
      <span class="chip active" data-cat="all">すべて</span>
      <span class="chip" data-cat="fas">締結部品</span>
      <span class="chip" data-cat="bld">建築・家具金物</span>
      <span class="chip" data-cat="pipe">配管・電設金物</span>
      <span class="chip" data-cat="gen">汎用</span>
    </div>
    <div class="examples">
      <b>例：</b>
      <span class="ex">緩み止め</span><span class="ex">石膏ボード</span><span class="ex">木 つなぐ</span>
      <span class="ex">ホース 締める</span><span class="ex">引き出し レール</span><span class="ex">高さ 調整</span>
    </div>
    <div class="meta" id="meta"></div>
    <div id="results"></div>
  </section>

  <footer>
    収録 <span id="count"></span> 件 ・ 単体HTML / オフライン動作 ・ サイズ・荷重は一般的な目安です。最終選定は耐荷重・材質・規格をご確認ください。
  </footer>
</div>

/* =========================================================
   3) 共通カード描画（イラスト＋サイズ表）
   ========================================================= */
function specTable(p){
  if(!p.spec||!p.spec.length)return"";
  return `<table class="spec">`+p.spec.map(r=>`<tr><th>${r[0]}</th><td>${r[1]}</td></tr>`).join("")+`</table>`;
}
function cardHTML(p,why,tokens){
  const aliases=(p.aliases||[]).slice(0,6).map(a=>`<span class="tag">${a}</span>`).join("");
  const whyHTML=why?`<p class="why">💡 ${why}</p>`:"";
  const hi=t=>tokens?highlight(t,tokens):t;
  return `<div class="card"><div class="cardrow">
    <div class="illus">${illusHTML(p)}</div>
    <div class="cbody">
      <h3><span>${hi(p.name)}</span><span class="yomi">${p.yomi}</span>
          <span class="catbadge cat-${p.cat}">${CATLABEL[p.cat]}</span></h3>
      ${whyHTML}
      <p class="desc">${hi(p.desc)}</p>
      <p class="uses"><b>用途：</b>${hi(p.uses)}</p>
      ${specTable(p)}
      <div class="tags">${aliases}</div>
    </div>
  </div></div>`;
}

const elIntentGrid=document.getElementById("intentGrid");
const elGuideTop=document.getElementById("guideTop");

const elFlowBody=document.getElementById("flowBody");
const elCrumb=document.getElementById("crumbPath");
let stack=[]; // [{title, node?|recs?}]

elIntentGrid.innerHTML=INTENTS.map((it,i)=>
  `<div class="tile" data-i="${i}">
     <span class="ic">${it.ic}</span><span class="tl">${it.label}</span><span class="sb">${it.sub}</span>
   </div>`).join("");
elIntentGrid.querySelectorAll(".tile").forEach(t=>
  t.addEventListener("click",()=>{const it=INTENTS[+t.dataset.i];stack=[{title:it.label,node:it.root}];renderFlow();}));

function renderFlow(){
  elGuideTop.classList.add("hidden");
  elGuideFlow.classList.remove("hidden");
  elCrumb.textContent=stack.map(s=>s.title).join("  ▸  ");
  const cur=stack[stack.length-1];

  if(cur.recs){ // 結果（葉）
    elFlowBody.innerHTML=`<div class="meta">おすすめの金物：${cur.recs.length} 件</div>`
      +cur.recs.map(r=>cardHTML(byId(r.id),r.why)).join("");
  }else{ // 質問
    const n=cur.node;
    elFlowBody.innerHTML=`<div class="qtitle">${n.q}</div>`
      +(n.hint?`<p class="qhint">${n.hint}</p>`:"")
      +`<div class="opts">`+n.opts.map((o,i)=>
        `<div class="opt" data-i="${i}">
           <span><span class="ol">${o.ol}</span>${o.od?`<div class="od">${o.od}</div>`:""}</span>
           <span class="arrow">→</span>
         </div>`).join("")+`</div>`;
    elFlowBody.querySelectorAll(".opt").forEach(op=>op.addEventListener("click",()=>{
      const o=n.opts[+op.dataset.i];
      if(o.next) stack.push({title:o.ol,node:o.next});
      else stack.push({title:o.ol,recs:o.recs});
      renderFlow();
    }));
  }
  window.scrollTo({top:0,behavior:"smooth"});
}
document.getElementById("backBtn").addEventListener("click",()=>{
  stack.pop();
  if(!stack.length){elGuideFlow.classList.add("hidden");elGuideTop.classList.remove("hidden");window.scrollTo({top:0,behavior:"smooth"});}
  else renderFlow();
});
document.getElementById("topBtn").addEventListener("click",()=>{
  stack=[];elGuideFlow.classList.add("hidden");elGuideTop.classList.remove("hidden");window.scrollTo({top:0,behavior:"smooth"});
});

/* =========================================================
   5) キーワード検索
   ========================================================= */
const norm=s=>(s||"").toString().toLowerCase()
  .replace(/[ァ-ン]/g,c=>String.fromCharCode(c.charCodeAt(0)-0x60))
  .replace(/[\s　,、。・／/]+/g," ").trim();
DB.forEach(p=>{p._hay={name:norm(p.name+" "+p.yomi),alias:norm((p.aliases||[]).join(" ")),
  tags:norm((p.tags||[]).join(" ")),uses:norm(p.uses),desc:norm(p.desc)};});
function scoreItem(p,tokens){let s=0,hit=0;for(const t of tokens){if(!t)continue;let g=0;
  if(p._hay.name.includes(t))g=Math.max(g,6);if(p._hay.alias.includes(t))g=Math.max(g,5);
  if(p._hay.tags.includes(t))g=Math.max(g,4);if(p._hay.uses.includes(t))g=Math.max(g,2);
  if(p._hay.desc.includes(t))g=Math.max(g,1);if(g){s+=g;hit++;}}if(hit>1)s+=hit*2;return s;}
function tokenize(q){const base=norm(q);if(!base)return[];const words=base.split(" ").filter(Boolean);
  const set=new Set(words);if(words.length<=1&&base.replace(/ /g,"").length>=3){const c=base.replace(/ /g,"");
  for(let n=2;n<=3;n++)for(let i=0;i+n<=c.length;i++)set.add(c.slice(i,i+n));}return[...set];}
function highlight(text,tokens){if(!tokens||!tokens.length)return text;let out=text;
  const ts=[...tokens].filter(t=>t.length>=2).sort((a,b)=>b.length-a.length);
  for(const t of ts){const re=new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"gi");out=out.replace(re,m=>`<mark>${m}</mark>`);}return out;}
const $q=document.getElementById("q"),$res=document.getElementById("results"),$meta=document.getElementById("meta");
let curCat="all";
function renderSearch(){const q=$q.value,tokens=tokenize(q);
  let list=DB.filter(p=>curCat==="all"||p.cat===curCat);
  if(tokens.length)list=list.map(p=>({p,s:scoreItem(p,tokens)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).map(x=>x.p);
  else list=list.slice().sort((a,b)=>a.id-b.id);
  $meta.textContent=tokens.length?`「${q}」の検索結果：${list.length} 件`
    :(curCat==="all"?`全 ${list.length} 件（キーワードで絞り込み）`:`${CATLABEL[curCat]}：${list.length} 件`);
  $res.innerHTML=list.length?list.map(p=>cardHTML(p,null,tokens)).join("")
    :`<div class="empty">該当なし。言い換え（例：「ゆるみ」「壁 固定」「木 つなぐ」）をお試しください。</div>`;}
$q.addEventListener("input",renderSearch);
document.getElementById("clear").addEventListener("click",()=>{$q.value="";renderSearch();$q.focus();});
